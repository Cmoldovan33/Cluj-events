<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3D6E"/>
      <stop offset="50%" style="stop-color:#9B59FF"/>
      <stop offset="100%" style="stop-color:#FF9500"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#shine)"/>

  <!-- Blob decorations -->
  <circle cx="420" cy="80" r="90" fill="#FF3D6E" opacity="0.3"/>
  <circle cx="80" cy="420" r="110" fill="#FF9500" opacity="0.25"/>
  <circle cx="380" cy="400" r="70" fill="#7B61FF" opacity="0.2"/>

  <!-- Star / spark top right -->
  <g transform="translate(390, 110)" filter="url(#glow)">
    <polygon points="0,-22 5,-8 20,-8 9,2 13,18 0,9 -13,18 -9,2 -20,-8 -5,-8" fill="white" opacity="0.9"/>
  </g>

  <!-- Small star bottom left -->
  <g transform="translate(118, 370)">
    <polygon points="0,-14 3,-5 13,-5 6,2 8,12 0,6 -8,12 -6,2 -13,-5 -3,-5" fill="white" opacity="0.6"/>
  </g>

  <!-- Dot accents -->
  <circle cx="155" cy="145" r="8" fill="white" opacity="0.4"/>
  <circle cx="360" cy="330" r="5" fill="white" opacity="0.35"/>
  <circle cx="430" cy="310" r="6" fill="white" opacity="0.3"/>

  <!-- Main text "CJ" -->
  <text
    x="256" y="300"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="210"
    letter-spacing="-8"
    fill="white"
    filter="url(#glow)"
  >CJ</text>

  <!-- Bottom tagline dots -->
  <circle cx="196" cy="370" r="7" fill="white" opacity="0.7"/>
  <circle cx="256" cy="370" r="7" fill="white" opacity="0.7"/>
  <circle cx="316" cy="370" r="7" fill="white" opacity="0.7"/>

</svg>
